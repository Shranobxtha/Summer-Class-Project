<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        form fieldset{
            height: auto;
            width: fit-content;
            margin-left: 43%;
        }
        #accept{
            margin-left: 43%;
        }
        #signup{
            margin-left: 43%;
        }
    </style>
</head>
<body>
<h1 align="center">Create Account</h1>
    <form>
        <fieldset>
            <legend>Account Details</legend>
            <label>Email:</label>
            <input type="email" id="email" name="email" placeholder="buzepi@mailinator.com">
            <br><br>

            <label>Password:</label>
            <input type="password" id="password" name="password" placeholder="999999999">
            <br>
        </fieldset>

        <br>

        <input type="checkbox" id="accept">
        <label>I agree to create an account.</label>

        <br><br>

        <input type="submit" id="signup" name="Sign Up" value="Sign Up">
    </form>
    <br>
</body>
</html>
