<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Admin Login</h1>
    <form>
        <fieldset>
            <legend>Account Details</legend>
            <label>Email:</label>
            <input type="email" id="email" name="email" placeholder="buzepi@mailinator.com">
            <br><br>

            <label>Password:</label>
            <input type="password" id="password" name="password" placeholder="999999999">
            <br><br>

            <label>Role:</label>
            <input type="radio" id="admin" name="role">
            <label>Admin</label>

            <input type="radio" id="user" name="role" checked>
            <label>User</label>
        </fieldset>

        <br>

        <input type="checkbox" id="terms">
        <label>Remember Me</label>

        <br>

        <input type="submit" id="register" name="register" value="Register">
        <input type="reset" id="reset" name="reset">
    </form>
    <br>
    <footer>
        &copy; 2026 My Inventory System. All rights reserved.
    </footer>
</body>
</html>
