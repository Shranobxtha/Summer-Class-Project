<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        form fieldset{
            height: auto;
            width: fit-content;
            margin-left: 43%;
        }
        #terms{
            margin-left: 43%;
        }
        #login{
            margin-left: 43%;
        }
        #create{
            margin-left: 1%;
        }
    </style>
</head>
<body>
    <h1 align="center">Admin Login</h1>
    <form>
        <fieldset>
            <legend>Account Details</legend>
            <label>Email:</label>
            <input type="email" id="email" name="email" placeholder="buzepi@mailinator.com">
            <br><br>

            <label>Password:</label>
            <input type="password" id="password" name="password" placeholder="999999999">
            <br>
        </fieldset>

        <br>

        <input type="checkbox" id="terms">
        <label>Remember Me</label>

        <br><br>

        <input type="submit" id="login" name="Login" value="Login">
        <input type="submit" id="create" value="Create a New Account">
    </form>
    <br>
    <footer>
        &copy; 2026 My Inventory System. All rights reserved.
    </footer>
</body>
</html>
